# nginx first-pass site config for kevin-todo.latinum.ca
# Install on the gateway VPS at:
#   /etc/nginx/sites-available/kevin-todo.latinum.ca
#
# This file is intentionally HTTP-only on first install so nginx can load
# before certbot creates the TLS material. After certbot runs, the gateway
# setup script rewrites the site to full HTTPS + basic auth.

server {
    listen 80;
    server_name kevin-todo.latinum.ca;

    location /operator-api/ {
        proxy_pass http://10.0.0.92:9876/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 25M;
    }

    location / {
        proxy_pass http://10.1.0.47:3010;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 25M;
    }
}
